SecRule ARGS|REQUEST_BODY|REQUEST_URI "@rx (?i)(union\s+select|or\s+1=1|select\s+.*from|drop\s+table|insert\s+into|delete\s+from|--|#)" \
"id:1000001,phase:2,deny,status:403,msg:'SQL Injection Detected'"

SecRule ARGS|REQUEST_BODY|REQUEST_URI "@rx (?i)(<script|javascript:|onerror=|onload=|alert\s*\(|iframe|svg|img\s+src)" \
"id:1000002,phase:2,deny,status:403,msg:'XSS Detected'"

SecRule ARGS|REQUEST_BODY|REQUEST_URI "@rx (?i)(\.\./|\.\.\\|%2e%2e|/etc/passwd|boot\.ini)" \
"id:1000003,phase:2,deny,status:403,msg:'Path Traversal Detected'"

SecRule ARGS|REQUEST_BODY|REQUEST_URI "@rx (?i)(/\.env|/\.git|backup|confidential|config)" \
"id:1000004,phase:2,deny,status:403,msg:'Sensitive File Access Detected'"